version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: db_sistema
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: db_sistema
    ports:
      - "3306:3306"
    volumes:
      # RÚBRICA: Persistencia de datos implementada correctamente
      - db_data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped

  api-ventas:
    # Ruta exacta donde creaste el primer Dockerfile
    build: ./back-Ventas_SpringBoot/Springboot-API-REST
    container_name: api_ventas
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/db_sistema
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
    depends_on:
      - db
    networks:
      - app-network
    restart: unless-stopped

  api-despachos:
    # Ruta exacta donde creaste el segundo Dockerfile
    build: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    container_name: api_despachos
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/db_sistema
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SERVER_PORT=8081
    depends_on:
      - db
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    # Ruta exacta donde creaste el tercer Dockerfile
    build: ./front_despacho
    container_name: app_frontend
    ports:
      - "80:80"
    depends_on:
      - api-ventas
      - api-despachos
    networks:
      - app-network
    restart: unless-stopped

# Declaración del volumen para la persistencia
volumes:
  db_data:

# Creación de red aislada para comunicación segura
networks:
  app-network:
    driver: bridge